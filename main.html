<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container mt-5 d-flex">
		<form class="needs-validation" novalidate>
			<h1>Internship Form</h1>
			<div class="mb-3 ">
				<label for="first-name-input" class="form-label"> First Name</label>
				<input type="text" id="first-name-input" class="form-control" required>
				<div class="invalid-feedback">
                First name required.
            </div>
				<div class="mb-3">
				<label for="last-name-input" class="form-label"> Last Name</label>
				<input type="text" id="last-name-input" class="form-control" required>
				<div class="invalid-feedback text-danger">
                Last name required.
            </div>
			   <div class="mb-3">
            <label for="email-input" class="form-label">Email</label>
            <input type="email" class="form-control" id="email-input" required>
            <div class="invalid-feedback">
                Please enter a valid email.
            </div>
        </div>

        <!-- College Name -->
        <div class="mb-3">
            <label for="college-input" class="form-label">College Name</label>
            <input type="text" class="form-control" id="college-input" required>
            <div class="invalid-feedback">
                Please enter your college name.
            </div>
        </div>

        <!-- Roll Number -->
        <div class="mb-3">
            <label for="roll-no-input" class="form-label">Roll Number</label>
            <input type="number" class="form-control" id="roll-no-input" required>
            <div class="invalid-feedback">
                Please enter your roll number.
            </div>
        </div>

        <!-- Graduation Year -->
        <div class="mb-3">
            <label class="form-label">Graduation Year</label>
            <select class="form-select" required>
                <option value="">Choose...</option>
                <option>2020</option>
                <option>2021</option>
                <option>2022</option>
                <option>2023</option>
            </select>
            <div class="invalid-feedback">
                Please select your graduation year.
            </div>
        </div>

        <!-- Checkbox -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="conditions-checkbox" required>
            <label class="form-check-label" for="conditions-checkbox">
                Agree to terms and conditions
            </label>
            <div class="invalid-feedback">
                You must agree before submitting.
            </div>
        </div>

        <!-- Submit Button -->
        <button class="btn btn-primary" type="submit">
            Submit
        </button>
			</div>
				</form>
	</div>
		
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
    'use strict';

    const forms = document.querySelectorAll('.needs-validation');

    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }

            form.classList.add('was-validated');
        }, false);
    });
})();
</script>

</body>

</html>
