<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <title>Internship Form</title>
</head>

<body>

    <div class="container mt-5 d-flex justify-content-center">
        
        <form class="needs-validation w-50" novalidate>

            <h1 class="mb-4">Internship Form</h1>

            <!-- First Name -->
            <div class="mb-3">
                <label for="first-name-input" class="form-label">
                    First Name
                </label>

                <input
                    type="text"
                    id="first-name-input"
                    class="form-control"
                    required>

                <div class="invalid-feedback">
                    First name required.
                </div>
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label for="last-name-input" class="form-label">
                    Last Name
                </label>

                <input
                    type="text"
                    id="last-name-input"
                    class="form-control"
                    required>

                <div class="invalid-feedback">
                    Last name required.
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email-input" class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    id="email-input"
                    class="form-control"
                    required>

                <div class="invalid-feedback">
                    Please enter a valid email.
                </div>
            </div>

            <!-- College Name -->
            <div class="mb-3">
                <label for="college-input" class="form-label">
                    College Name
                </label>

                <input
                    type="text"
                    id="college-input"
                    class="form-control"
                    required>

                <div class="invalid-feedback">
                    Please enter your college name.
                </div>
            </div>

            <!-- Roll Number -->
            <div class="mb-3">
                <label for="roll-no-input" class="form-label">
                    Roll Number
                </label>

                <input
                    type="number"
                    id="roll-no-input"
                    class="form-control"
                    required>

                <div class="invalid-feedback">
                    Please enter your roll number.
                </div>
            </div>

            <!-- Graduation Year -->
            <div class="mb-3">
                <label for="graduation-year" class="form-label">
                    Graduation Year
                </label>

                <select
                    id="graduation-year"
                    class="form-select"
                    required>

                    <option value="">Choose...</option>
                    <option>2020</option>
                    <option>2021</option>
                    <option>2022</option>
                    <option>2023</option>

                </select>

                <div class="invalid-feedback">
                    Please select your graduation year.
                </div>
            </div>

            <!-- Checkbox -->
            <div class="form-check mb-3">

                <input
                    class="form-check-input"
                    type="checkbox"
                    id="conditions-checkbox"
                    required>

                <label
                    class="form-check-label"
                    for="conditions-checkbox">

                    Agree to terms and conditions

                </label>

                <div class="invalid-feedback">
                    You must agree before submitting.
                </div>

            </div>

            <!-- Submit Button -->
            <button class="btn btn-primary" type="submit">
                Submit
            </button>

        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Validation Script -->
    <script>
        (() => {
            'use strict';

            const forms = document.querySelectorAll('.needs-validation');

            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {

                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }

                    form.classList.add('was-validated');

                }, false);
            });
        })();
    </script>

</body>

</html>
